services:
    db:
        image: postgres:16-alpine
        container_name: url-short-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: urlshort
            POSTGRES_PASSWORD: admin
            POSTGRES_DB: urlshort
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U urlshort -d urlshort"]
            interval: 5s
            timeout: 3s
            retries: 10
    api:
        build:
            context: ./server
            dockerfile: Dockerfile
        container_name: url-short-api
        restart: unless-stopped
        environment:
            DB_URL: postgres://urlshort:admin@db:5432/urlshort?sslmode=disable
            DOMAIN: http://82.202.142.231
        depends_on:
            db:
                condition: service_healthy
        expose:
            - "8080"
    web:
        build:
            context: ./app
            dockerfile: Dockerfile
        container_name: url-short-web
        restart: unless-stopped
        environment:
            VITE_API_BASE_URL: ""
            NODE_ENV: production
        depends_on:
            - api
        expose:
            - "3000"
    nginx:
        image: nginx:1.27-alpine
        container_name: url-short-nginx
        restart: unless-stopped
        depends_on:
            - web
            - api
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
volumes:
    pg_data: