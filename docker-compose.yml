services:
    db:
        image: postgres:16-alpine
        container_name: url-short-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: urlshort
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: urlshort
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U urlshort -d urlshort"]
            interval: 5s
            timeout: 3s
            retries: 10

    migrate:
        image: postgres:16-alpine
        container_name: url-short-migrate
        restart: "no"
        depends_on:
            db:
                condition: service_healthy
        environment:
            PGPASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - ./server/sql/schema:/migrations:ro
        command: >
            sh -c "echo '[migrate] checking mounted files...' && ls -la /migrations && \
            echo '[migrate] running 001_urls.up.sql...' && \
            psql -h db -U urlshort -d urlshort -v ON_ERROR_STOP=1 -f /migrations/001_urls.up.sql && \
            echo '[migrate] urls table after migration:' && \
            psql -h db -U urlshort -d urlshort -c \"SELECT to_regclass('public.urls') IS NOT NULL AS urls_exists;\""
    api:
        build:
            context: ./server
            dockerfile: Dockerfile
        container_name: url-short-api
        restart: unless-stopped
        environment:
            DB_URL: postgres://urlshort:${POSTGRES_PASSWORD}@db:5432/urlshort?sslmode=disable
            DOMAIN: ${DOMAIN}
        depends_on:
            db:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        expose:
            - "8080"
    web:
        build:
            context: ./app
            dockerfile: Dockerfile
        container_name: url-short-web
        restart: unless-stopped
        environment:
            VITE_API_BASE_URL: ""
            NODE_ENV: production
        depends_on:
            - api
        expose:
            - "3000"
    nginx:
        image: nginx:1.27-alpine
        container_name: url-short-nginx
        restart: unless-stopped
        depends_on:
            - web
            - api
        ports:
            - "80:80"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
volumes:
    pg_data: