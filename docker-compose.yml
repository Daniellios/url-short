services:
    db:
        image: postgres:16-alpine
        container_name: url-short-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: urlshort
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: urlshort
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U urlshort -d urlshort"]
            interval: 5s
            timeout: 3s
            retries: 10

    migrate:
        image: postgres:16-alpine
        container_name: url-short-migrate
        restart: "no"
        depends_on:
            db:
                condition: service_healthy
        environment:
            PGPASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - ./server/cmd/url-short/sql/schema:/migrations:ro
        command: >
            sh -c "echo '[migrate] checking mounted files...' && ls -la /migrations && \
            echo '[migrate] running 001_urls.up.sql...' && \
            psql -h db -U urlshort -d urlshort -v ON_ERROR_STOP=1 -f /migrations/001_urls.up.sql && \
            echo '[migrate] urls table after migration:' && \
            psql -h db -U urlshort -d urlshort -c \"SELECT to_regclass('public.urls') IS NOT NULL AS urls_exists;\""
    migrate-pastebin:
        image: postgres:16-alpine
        container_name: url-short-migrate-pastebin
        restart: "no"
        depends_on:
            db:
                condition: service_healthy
        environment:
            PGPASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - ./server/cmd/pastebin/sql/schema:/migrations:ro
        command: >
            sh -c "echo '[migrate-pastebin] ensuring pastebin db exists...' && \
            psql -h db -U urlshort -d postgres -v ON_ERROR_STOP=1 -c \"SELECT 'CREATE DATABASE pastebin' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'pastebin')\\gexec\" && \
            echo '[migrate-pastebin] running 001_pastes.up.sql...' && \
            psql -h db -U urlshort -d pastebin -v ON_ERROR_STOP=1 -f /migrations/001_pastes.up.sql && \
            echo '[migrate-pastebin] pastes table after migration:' && \
            psql -h db -U urlshort -d pastebin -c \"SELECT to_regclass('public.pastes') IS NOT NULL AS pastes_exists;\""
    api:
        build:
            context: ./server
            dockerfile: Dockerfile
            args:
                APP_CMD: ./cmd/url-short
        container_name: url-short-api
        restart: unless-stopped
        environment:
            APP_ENV: production
            DOCKER: "1"
            DB_URL: postgres://urlshort:${POSTGRES_PASSWORD}@db:5432/urlshort?sslmode=disable
            # Browser-facing origin for short links. Prefer COMPOSE_DOMAIN so local Docker can use
            # localhost while a legacy DOMAIN in .env might still point at a VPS.
            # Priority: COMPOSE_DOMAIN → DOMAIN → http://localhost
            DOMAIN: ${COMPOSE_DOMAIN:-${DOMAIN:-http://localhost}}
        depends_on:
            db:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        expose:
            - "8080"
    pastebin:
        build:
            context: ./server
            dockerfile: Dockerfile
            args:
                APP_CMD: ./cmd/pastebin
        container_name: url-short-pastebin
        restart: unless-stopped
        environment:
            APP_ENV: production
            DOCKER: "1"
            DB_URL: postgres://urlshort:${POSTGRES_PASSWORD}@db:5432/pastebin?sslmode=disable
        depends_on:
            db:
                condition: service_healthy
            migrate-pastebin:
                condition: service_completed_successfully
        expose:
            - "8081"
    web:
        build:
            context: ./app
            dockerfile: Dockerfile
        container_name: url-short-web
        restart: unless-stopped
        environment:
            VITE_API_BASE_URL: ""
            NODE_ENV: production
        depends_on:
            - api
            - pastebin
        expose:
            - "3000"
    nginx:
        image: nginx:1.27-alpine
        container_name: url-short-nginx
        restart: unless-stopped
        depends_on:
            - web
            - api
            - pastebin
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
    certbot:
        image: certbot/certbot:latest
        container_name: url-short-certbot
        restart: unless-stopped
        volumes:
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        entrypoint: >
            sh -c "trap exit TERM; while :; do
            certbot renew --webroot -w /var/www/certbot --quiet;
            sleep 12h;
            done"
volumes:
    pg_data: