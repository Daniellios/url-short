services:
    db:
        image: postgres:16-alpine
        container_name: url-short-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: urlshort
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: urlshort
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U urlshort -d urlshort"]
            interval: 5s
            timeout: 3s
            retries: 10

    # golang-migrate reads a flat directory; merge sql/schema/up + down into /tmp/mig before running.
    migrate:
        image: migrate/migrate:v4.18.3
        container_name: url-short-migrate
        restart: "no"
        depends_on:
            db:
                condition: service_healthy
        environment:
            DATABASE_URL: postgres://urlshort:${POSTGRES_PASSWORD}@db:5432/urlshort?sslmode=disable
        volumes:
            - ./server/cmd/url-short/sql/schema/up:/schema-up:ro
            - ./server/cmd/url-short/sql/schema/down:/schema-down:ro
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                set -e
                mkdir -p /tmp/mig
                cp /schema-up/*.sql /tmp/mig/
                cp /schema-down/*.sql /tmp/mig/
                exec migrate -path "file:///tmp/mig" -database "$$DATABASE_URL" up
    # migrate does not create databases; ensure pastebin exists before migrate-pastebin.
    init-pastebin-db:
        image: postgres:16-alpine
        container_name: url-short-init-pastebin-db
        restart: "no"
        depends_on:
            db:
                condition: service_healthy
        environment:
            PGPASSWORD: ${POSTGRES_PASSWORD}
        command: >
            sh -c "(psql -h db -U urlshort -d postgres -tAc \"SELECT 1 FROM pg_database WHERE datname = 'pastebin'\" | grep -q 1)
            || psql -h db -U urlshort -d postgres -v ON_ERROR_STOP=1 -c \"CREATE DATABASE pastebin\""
    migrate-pastebin:
        image: migrate/migrate:v4.18.3
        container_name: url-short-migrate-pastebin
        restart: "no"
        depends_on:
            db:
                condition: service_healthy
            init-pastebin-db:
                condition: service_completed_successfully
        environment:
            DATABASE_URL: postgres://urlshort:${POSTGRES_PASSWORD}@db:5432/pastebin?sslmode=disable
        volumes:
            - ./server/cmd/pastebin/sql/schema/up:/schema-up:ro
            - ./server/cmd/pastebin/sql/schema/down:/schema-down:ro
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
                set -e
                mkdir -p /tmp/mig
                cp /schema-up/*.sql /tmp/mig/
                cp /schema-down/*.sql /tmp/mig/
                exec migrate -path "file:///tmp/mig" -database "$$DATABASE_URL" up
    api:
        build:
            context: ./server
            dockerfile: Dockerfile
            args:
                APP_CMD: ./cmd/url-short
        container_name: url-short-api
        restart: unless-stopped
        environment:
            APP_ENV: production
            DOCKER: "1"
            DB_URL: postgres://urlshort:${POSTGRES_PASSWORD}@db:5432/urlshort?sslmode=disable
            # Browser-facing origin for short links. Prefer COMPOSE_DOMAIN so local Docker can use
            # localhost while a legacy DOMAIN in .env might still point at a VPS.
            # Priority: COMPOSE_DOMAIN → DOMAIN → http://localhost
            DOMAIN: ${COMPOSE_DOMAIN:-${DOMAIN:-http://localhost}}
        depends_on:
            db:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        expose:
            - "8080"
    pastebin:
        build:
            context: ./server
            dockerfile: Dockerfile
            args:
                APP_CMD: ./cmd/pastebin
        container_name: url-short-pastebin
        restart: unless-stopped
        environment:
            APP_ENV: production
            DOCKER: "1"
            DB_URL: postgres://urlshort:${POSTGRES_PASSWORD}@db:5432/pastebin?sslmode=disable
        depends_on:
            db:
                condition: service_healthy
            migrate-pastebin:
                condition: service_completed_successfully
        expose:
            - "8081"
    web:
        build:
            context: ./app
            dockerfile: Dockerfile
        container_name: url-short-web
        restart: unless-stopped
        environment:
            VITE_API_BASE_URL: ""
            NODE_ENV: production
        depends_on:
            - api
            - pastebin
        expose:
            - "3000"
    nginx:
        image: nginx:1.27-alpine
        container_name: url-short-nginx
        restart: unless-stopped
        depends_on:
            - web
            - api
            - pastebin
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
    certbot:
        image: certbot/certbot:latest
        container_name: url-short-certbot
        restart: unless-stopped
        volumes:
            - ./certbot/conf:/etc/letsencrypt
            - ./certbot/www:/var/www/certbot
        entrypoint: >
            sh -c "trap exit TERM; while :; do
            certbot renew --webroot -w /var/www/certbot --quiet;
            sleep 12h;
            done"
volumes:
    pg_data: