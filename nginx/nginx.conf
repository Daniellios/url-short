events {}

http {
  upstream web_upstream {
    server web:3000;
  }

  upstream api_upstream {
    server api:8080;
  }

  upstream pastebin_upstream {
    server pastebin:8081;
  }

  # Required for websocket upgrade and proxied connection headers.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name utilitools.tech www.utilitools.tech;

    # Let's Encrypt ACME challenge endpoint.
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name utilitools.tech www.utilitools.tech;

    # One certificate covers both names; Certbot stores it under the first -d domain.
    # Issue with: -d utilitools.tech -d www.utilitools.tech  →  live/utilitools.tech/
    ssl_certificate /etc/letsencrypt/live/utilitools.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/utilitools.tech/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Pastebin API endpoints
    location /api/pastebin/ {
      proxy_pass http://pastebin_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # URL shortener API endpoints
    location /api/ {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Short URL redirect route: /{7-char-code}
    location ~ "^/[A-Za-z0-9]{7}$" {
      proxy_pass http://api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else goes to TanStack Start web app
    location / {
      proxy_pass http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
